name: Refresh cellar export
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}
jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pull CellarTracker into Supabase (ingest)
        env:
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$INGEST_SECRET" ]; then
            echo "INGEST_SECRET not set yet; skipping live pull and exporting last-known-good."
          else
            code=$(curl -sS -o /tmp/ingest.json -w '%{http_code}' -X POST \
              -H "x-ingest-secret: $INGEST_SECRET" \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              https://ahofommkgdrpedivuxai.supabase.co/functions/v1/ingest || echo 000)
            echo "ingest HTTP $code"
            head -c 500 /tmp/ingest.json 2>/dev/null || true
            echo
            if [ "$code" != "200" ]; then
              echo "::warning::Ingest returned $code (not 200); exporting last-known-good instead."
            fi
          fi
      - name: Export cellar from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node export-cellar.mjs
      - name: Commit if changed
        run: |
          git config user.name "cellar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add cellar.json cellar.md
          git diff --staged --quiet || git commit -m "Cellar refresh $(date -u +%Y-%m-%d)"
          git push
