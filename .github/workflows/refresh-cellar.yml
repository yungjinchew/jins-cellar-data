name: Refresh cellar export
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch: {}
jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Export cellar from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node export-cellar.mjs
      - name: Commit if changed
        run: |
          git config user.name "cellar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add cellar.json cellar.md
          git diff --staged --quiet || git commit -m "Cellar refresh $(date -u +%Y-%m-%d)"
          git push
